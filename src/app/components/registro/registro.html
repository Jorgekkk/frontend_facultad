<div class="login-container">
  <div class="login-card">
    <div class="brand-header">
      
      <div class="logos-container">
        <div class="logo-fcc logo-buap-img"></div>
        <div class="logo-fcc logo-escudo-img"></div>
      </div>
      
      <h1>VEN FCC</h1>
      <p>Crea tu cuenta ahora</p>
    </div>

    <form (ngSubmit)="onRegistro()">

      <div class="input-group">
        <input type="text" placeholder="Usuario" name="username" [(ngModel)]="registroData.username" required>
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="brand-small-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </span>
      </div>

      <div class="input-group">
        <input type="email" placeholder="Correo Electrónico" name="email" [(ngModel)]="registroData.email" required>
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="brand-small-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
        </span>
      </div>

      <div class="input-group">
        <input type="password" placeholder="Contraseña" name="password" [(ngModel)]="registroData.password" required>
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="brand-small-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </span>
      </div>

      <button type="submit" class="login-button">Registrarse</button>

      <div class="form-footer">
        <span style="opacity: 0.8;">¿Ya tienes una cuenta?</span>
        <a routerLink="/login" class="create-account">Inicia Sesión</a>
      </div>
    </form>
  </div>
</div>
