<div class="login-container">
  <div class="login-card">
    <div class="brand-header">
      
      <div class="logos-container">
        <div class="logo-fcc logo-buap-img"></div>
        <div class="logo-fcc logo-escudo-img"></div>
      </div>
      
      <h1>VEN FCC</h1>
      <p>Bienvenido a tu comunidad</p>
    </div>

    <form (ngSubmit)="onLogin()">

      <div class="input-group">
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="brand-small-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
        </span>
        <input type="email" placeholder="Correo electrónico" name="email" [(ngModel)]="credentials.email" required>
      </div>

      <div class="input-group">
        <span class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="brand-small-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
        </span>
        <input type="password" placeholder="Contraseña" name="password" [(ngModel)]="credentials.password" required>
      </div>

      <button type="submit" class="login-button">Iniciar Sesión</button>

      <div class="form-footer">
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        <span class="separator">|</span>
        <a routerLink="/registro" class="create-account">Crear una cuenta</a>
      </div>
    </form>
  </div>
</div>
